<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Roost mark">
  <title>Roost mark</title>
  <!-- 64x64 monochrome mark for favicons / GitHub social tile -->
  <defs>
    <linearGradient id="mGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3D7BB0"/>
      <stop offset="100%" stop-color="#2A5478"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#mGrad)"/>
  <ellipse cx="30" cy="36" rx="16" ry="12" fill="#F4F6F8"/>
  <circle cx="42" cy="26" r="9" fill="#F4F6F8"/>
  <circle cx="44" cy="24" r="2.5" fill="#142840"/>
  <path d="M50 26 L57 28 L50 31 Z" fill="#F2B856"/>
  <rect x="14" y="46" width="36" height="3" rx="1.5" fill="#F2B856"/>
</svg>
